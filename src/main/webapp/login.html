<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — SQL Query Evaluator</title>
  <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@300;400;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #070710; --surface: #0d0d1a; --panel: #10101f;
      --border: #1c1c35; --border-hi: #2a2a50;
      --cyan: #00d4ff; --cyan-dim: rgba(0,212,255,0.15);
      --green: #39ff14; --text: #c8d6e8;
      --text-dim: #5a6a80; --red: #ff4560;
    }
    html, body {
      height: 100%; background: var(--bg);
      color: var(--text); font-family: 'Oxanium', sans-serif;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px; pointer-events: none; z-index: 0;
    }
    body::after {
      content: ''; position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 600px; height: 600px;
      background: radial-gradient(ellipse, rgba(0,212,255,0.07) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }
    .page-wrap {
      position: relative; z-index: 1; min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 40px 20px;
    }
    .header { text-align: center; margin-bottom: 32px; animation: fadeDown 0.7s ease both; }
    .logo-tag {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--cyan-dim); border: 1px solid rgba(0,212,255,0.25);
      border-radius: 4px; padding: 4px 14px; font-size: 11px;
      font-family: 'JetBrains Mono', monospace; color: var(--cyan);
      letter-spacing: 2px; text-transform: uppercase; margin-bottom: 16px;
    }
    .logo-tag::before { content: '◆'; font-size: 8px; }
    h1 {
      font-size: clamp(24px, 4vw, 40px); font-weight: 800;
      background: linear-gradient(135deg, #fff 0%, var(--cyan) 60%, var(--green) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .subtitle {
      margin-top: 8px; font-size: 12px; color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace; letter-spacing: 1px;
    }
    .card {
      width: 100%; max-width: 420px;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
      box-shadow: 0 0 0 1px var(--border-hi), 0 24px 80px rgba(0,0,0,0.8),
                  0 0 60px rgba(0,212,255,0.05);
      animation: fadeUp 0.7s 0.15s ease both;
    }
    .titlebar {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 20px; background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .dots { display: flex; gap: 7px; }
    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .dot-r { background: #ff5f57; } .dot-y { background: #ffbd2e; } .dot-g { background: #28ca41; }
    .titlebar-label {
      flex: 1; text-align: center;
      font-family: 'JetBrains Mono', monospace; font-size: 12px;
      color: var(--text-dim); letter-spacing: 1px;
    }
    .form-body { padding: 32px 28px; display: flex; flex-direction: column; gap: 20px; }
    .field { display: flex; flex-direction: column; gap: 8px; }
    .field label {
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase;
    }
    .field input {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 16px;
      font-family: 'JetBrains Mono', monospace; font-size: 13px;
      color: var(--text); outline: none; transition: border-color 0.25s, box-shadow 0.25s;
    }
    .field input:focus {
      border-color: rgba(0,212,255,0.4);
      box-shadow: 0 0 0 3px rgba(0,212,255,0.08);
    }
    .field input::placeholder { color: var(--text-dim); }
    .error-msg {
      background: rgba(255,69,96,0.1); border: 1px solid rgba(255,69,96,0.3);
      border-radius: 6px; padding: 10px 14px;
      font-family: 'JetBrains Mono', monospace; font-size: 12px;
      color: var(--red); display: flex; align-items: center; gap: 8px;
    }
    .btn-login {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      background: linear-gradient(135deg, #00b8e6, #0094cc);
      border: none; border-radius: 8px; padding: 14px;
      font-family: 'Oxanium', sans-serif; font-size: 14px;
      font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
      color: #fff; cursor: pointer; transition: all 0.25s ease;
      box-shadow: 0 0 20px rgba(0,180,230,0.3);
    }
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 35px rgba(0,212,255,0.5);
    }
    .card:focus-within {
      border-color: rgba(0,212,255,0.3);
      box-shadow: 0 0 0 1px rgba(0,212,255,0.15), 0 24px 80px rgba(0,0,0,0.8),
                  0 0 80px rgba(0,212,255,0.1);
    }
    @keyframes fadeDown { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeUp   { from { opacity:0; transform:translateY(20px);  } to { opacity:1; transform:translateY(0); } }
  </style>
</head>
<body>
  <div class="page-wrap">
    <div class="header">
      <div class="logo-tag">SQL Query Evaluator</div>
      <h1>Welcome Back</h1>
      <p class="subtitle">// authenticate to continue</p>
    </div>
    <div class="card">
      <div class="titlebar">
        <div class="dots">
          <div class="dot dot-r"></div>
          <div class="dot dot-y"></div>
          <div class="dot dot-g"></div>
        </div>
        <div class="titlebar-label">auth.sql — login</div>
      </div>
      <div class="form-body">
        <div id="errorBox" class="error-msg" style="display:none">
          ⚠ Invalid username or password
        </div>
        <div class="field">
          <label>Username</label>
          <input type="text" id="username" name="username" placeholder="enter username" autocomplete="off"/>
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••"/>
        </div>
        <button class="btn-login" onclick="doLogin()">
          🔐 &nbsp; Sign In
        </button>
      </div>
    </div>
  </div>
  <script>
    // Show error if ?error=1 in URL
    if (new URLSearchParams(window.location.search).get('error') === '1') {
      document.getElementById('errorBox').style.display = 'flex';
    }

    function doLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      if (!username || !password) {
        document.getElementById('errorBox').style.display = 'flex';
        document.getElementById('errorBox').textContent = '⚠ Please fill in both fields';
        return;
      }
      // Submit as form POST to /login servlet
      const form = document.createElement('form');
      form.method = 'POST';
      form.action = 'login';
      ['username','password'].forEach(key => {
        const input = document.createElement('input');
        input.type = 'hidden';
        input.name = key;
        input.value = key === 'username' ? username : password;
        form.appendChild(input);
      });
      document.body.appendChild(form);
      form.submit();
    }

    // Enter key support
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
  </script>
</body>
</html>
